name: Blender to Rust Batch Conversion

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of file pairs to convert in this batch'
        required: true
        default: '5'
      model:
        description: 'Ollama model name'
        required: true
        default: 'qwen2.5-coder:14b'
      workers:
        description: 'Number of parallel Ollama conversion workers'
        required: true
        default: '1'
      request_timeout:
        description: 'Ollama request timeout in seconds'
        required: true
        default: '1800'
      retries:
        description: 'Number of retry attempts per file after an Ollama failure'
        required: true
        default: '2'
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ensure rustfmt
        run: rustup component add rustfmt

      - name: Cache Ollama Models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ runner.os }}-${{ github.event.inputs.model || 'qwen2.5-coder:14b' }}
          restore-keys: |
            ollama-${{ runner.os }}-

      - name: Cache Blender Source Code
        uses: actions/cache@v4
        with:
          path: blender
          key: blender-${{ runner.os }}-v5.2.0

      - name: Setup CUDA / GPU (If GPU Available)
        run: |
          if command -v nvidia-smi &> /dev/null; then
            echo "NVIDIA GPU Detected!"
            nvidia-smi
          else
            echo "No NVIDIA GPU detected on this runner, running on CPU."
          fi
          echo "Runner memory:"
          free -h
          echo "Runner disk:"
          df -h .

      - name: Guard Heavy Local Models
        run: |
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:14b' }}"
          if ! command -v nvidia-smi &> /dev/null; then
            case "$MODEL" in
              qwen3-coder:30b|qwen3-coder:480b|qwen3-coder-next*|qwen2.5-coder:32b)
                echo "::error::Model $MODEL is too large for GitHub-hosted CPU runners. Use a self-hosted runner with enough RAM/VRAM, or choose qwen2.5-coder:14b / qwen2.5-coder:7b."
                exit 1
                ;;
            esac
          fi

      - name: Install Ollama & Pull Model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > ollama.log 2>&1 &
          sleep 5
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:14b' }}"
          echo "Pulling model $MODEL..."
          ollama pull "$MODEL"

      - name: Clone Blender Source Code (v5.2.0)
        run: |
          if [ ! -d "blender" ]; then
            echo "Cloning Blender source code v5.2.0..."
            git clone --depth 1 --branch v5.2.0 https://projects.blender.org/blender/blender.git blender || git clone --depth 1 --branch v5.2.0 https://github.com/blender/blender.git blender
          fi

      - name: Run Bulk Converter Script
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '5' }}"
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:14b' }}"
          WORKERS="${{ github.event.inputs.workers || '1' }}"
          REQUEST_TIMEOUT="${{ github.event.inputs.request_timeout || '1800' }}"
          RETRIES="${{ github.event.inputs.retries || '2' }}"
          python3 python/batch_converter.py \
            --batch-size "$BATCH_SIZE" \
            --model "$MODEL" \
            --workers "$WORKERS" \
            --request-timeout "$REQUEST_TIMEOUT" \
            --retries "$RETRIES"

      - name: Auto Commit & Push Changes
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto(convert): bulk transpile Blender C/C++ files to Rust via Ollama"
          file_pattern: "src/ python/converted_manifest.json"

name: Blender to Rust Batch Conversion

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of file pairs to convert in this batch'
        required: true
        default: '20'
      model:
        description: 'Ollama model name'
        required: true
        default: 'qwen2.5-coder:7b'
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  convert:
    # Attempt to request GPU runners if available, fallback to standard runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup CUDA / GPU (If GPU Available)
        run: |
          if command -v nvidia-smi &> /dev/null; then
            echo "NVIDIA GPU Detected!"
            nvidia-smi
          else
            echo "No NVIDIA GPU detected on this runner, running on CPU."
          fi

      - name: Install Ollama & Pull Model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > ollama.log 2>&1 &
          sleep 5
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}"
          echo "Pulling model $MODEL..."
          ollama pull "$MODEL"

      - name: Clone Blender Source Code (v5.2.0)
        run: |
          if [ ! -d "blender" ]; then
            echo "Cloning Blender source code v5.2.0..."
            git clone --depth 1 --branch v5.2.0 https://projects.blender.org/blender/blender.git blender || git clone --depth 1 --branch v5.2.0 https://github.com/blender/blender.git blender
          fi

      - name: Run Bulk Converter Script
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '20' }}"
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}"
          python3 python/batch_converter.py --batch-size "$BATCH_SIZE" --model "$MODEL"

      - name: Auto Commit & Push Changes
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto(convert): bulk transpile Blender C/C++ files to Rust via Qwen2.5-Coder"
          file_pattern: "src/ python/converted_manifest.json"
